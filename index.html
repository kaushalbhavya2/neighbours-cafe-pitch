      padding: 0;

    html {

    body {

      background:

      line-height: 1.6;

    body::before {

      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.15) 1px, transparent 1px);

      z-index: -1;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      backdrop-filter: blur(18px);
      background: rgba(244, 248, 246, 0.82);
      border-bottom: 1px solid rgba(45, 108, 99, 0.08);
    }

      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 16px 0;
    }
